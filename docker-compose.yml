version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: logistic_pg
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: root
      POSTGRES_DB: logistics
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    container_name: logistic_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pg_data: